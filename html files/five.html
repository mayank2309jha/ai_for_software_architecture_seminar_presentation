<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>AI for Software Architecture</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Top Section */
    .header {
      flex: 1;
      background-color: #1767b1;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: 32px;
      font-weight: bold;
    }

    .header h2 {
      margin: 8px 0 0 0;
      font-size: 22px;
      font-weight: normal;
    }

    /* Middle Section */
    .middle {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 18px;
      color: #333;
    }

    /* Bottom Section */
    .footer {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .footer p {
      font-size: 28px;
      font-style: italic;
      max-width: 900px;
      line-height: 1.4;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- Top -->
    <div class="header">
      <h1>AI for Software Architecture</h1>
      <h2>From Design to Optimization</h2>
    </div>

    <!-- Middle -->
    <div class="middle">
      Research Synthesis
    </div>

    <!-- Bottom -->
    <div class="footer">
      <p>
        How AI augments architectural decision-making across the full lifecycle
      </p>
    </div>

  </div>

</body>

</html>
