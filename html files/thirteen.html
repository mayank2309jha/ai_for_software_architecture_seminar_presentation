<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Azure Advisor</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }

    /* Header */
    .header {
      padding: 40px 60px 10px 60px;
      font-size: 64px;
      font-weight: 500;
    }

    /* Layout */
    .container {
      display: flex;
      gap: 60px;
      padding: 20px 60px 60px 60px;
      align-items: center;
    }

    /* Left Image */
    .left {
      flex: 1.3;
    }

    .left img {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.3);
    }

    /* Right Content */
    .right {
      flex: 1;
    }

    .right h2 {
      font-size: 40px;
      margin-bottom: 25px;
      font-weight: normal;
      color: #444;
    }

    .points {
      font-size: 36px;
      line-height: 1.6;
      color: #555;
    }

    .points li {
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

  <!-- Title -->
  <div class="header">
    Azure Advisor
  </div>

  <!-- Content -->
  <div class="container">

    <!-- Left: Image -->
    <div class="left">
      <img src="azure.png" alt="Azure Advisor">
    </div>

    <!-- Right: Text -->
    <div class="right">
      <h2>Suggests Changes that</h2>
      <ul class="points">
        <li>Reduces cost</li>
        <li>Increases reliability</li>
        <li>Reduces storage</li>
      </ul>
    </div>

  </div>

</body>

</html>
