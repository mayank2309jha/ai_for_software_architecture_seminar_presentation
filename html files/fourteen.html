<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Research Synthesis Slide</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* TOP BLUE HEADER */
    .header {
      background-color: #2b6aa3;
      color: white;
      text-align: center;
      padding: 60px 100px 100px 0px;
    }

    .header h1 {
      margin: 0;
      font-size: 100px;
      /* ~50% increase */
      font-weight: 700;
    }

    .header .subtitle {
      font-size: 50px;
      /* half of title */
      margin-top: 50px;
    }

    .header .authors {
      font-size: 40px;
      margin-top: 50px;
    }

    /* MAIN BODY */
    .content {
      background-color: #d3d3d3;
      height: calc(100vh - 180px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .section-title {
      font-size: 30px;
      /* +20% */
      margin-bottom: 120px;
    }

    .main-text {
      font-size: 36px;
      /* +20% */
      font-style: italic;
      text-align: center;
      max-width: 900px;
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>AI for Software Architecture</h1>

    <!-- Replaced text -->
    <div class="subtitle">by team CODECRAFTERS</div>

    <!-- Added authors -->
    <div class="authors">
      Dohil Sakhre, Umang Jaiswal, Mayank Jha
    </div>
  </div>

  <div class="content">
    <div class="section-title">Research Synthesis</div>

    <div class="main-text">
      How AI augments architectural decision-making across the full lifecycle
    </div>
  </div>

</body>

</html>
